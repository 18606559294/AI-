# Kubernetes Service - AI Resume 后端服务
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-resume
  labels:
    app: ai-resume
    component: backend
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: ai-resume
    component: backend
---
# Kubernetes Service - AI Resume 前端服务
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ai-resume
  labels:
    app: ai-resume
    component: frontend
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: ai-resume
    component: frontend
---
# Kubernetes Service - Redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ai-resume
  labels:
    app: ai-resume
    component: redis
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: ai-resume
    component: redis
---
# Kubernetes Service - MySQL
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ai-resume
  labels:
    app: ai-resume
    component: mysql
spec:
  type: ClusterIP
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
    protocol: TCP
  selector:
    app: ai-resume
    component: mysql
