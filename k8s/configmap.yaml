apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-resume
data:
  # 应用配置
  DEBUG: "false"
  USE_SQLITE: "false"
  API_V1_PREFIX: "/api/v1"
  APP_NAME: "AI Resume"
  APP_VERSION: "1.0.0"

  # 数据库连接 (组件名称作为主机名)
  DATABASE_URL: "mysql+aiomysql://airesume:PASSWORD_PLACEHOLDER@mysql:3306/ai_resume"

  # Redis 连接
  REDIS_URL: "redis://redis:6379/0"
  REDIS_EXPIRE_SECONDS: "86400"

  # CORS 配置
  CORS_ORIGINS: '["https://ai-resume.yourdomain.com","https://www.ai-resume.yourdomain.com"]'
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_ALLOW_METHODS: '["GET","POST","PUT","DELETE","OPTIONS"]'
  CORS_ALLOW_HEADERS: '["Authorization","Content-Type","X-Requested-With"]'

  # JWT 配置
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"

  # AI 配置
  DEFAULT_AI_PROVIDER: "xiaomi"
  AI_RATE_LIMIT_PER_MINUTE: "10"
  AI_MAX_TOKENS: "2000"

  # 文件上传配置
  MAX_UPLOAD_SIZE: "10485760"
  ALLOWED_EXTENSIONS: '["pdf","docx","doc","jpg","png","jpeg"]'

  # 导出配置
  EXPORT_TIMEOUT_SECONDS: "120"
  EXPORT_TEMP_DIR: "/tmp/exports"

  # 邮箱验证配置
  VERIFICATION_CODE_EXPIRE_MINUTES: "10"
  EMAIL_FROM: "AI Resume <noreply@example.com>"

  # 分页配置
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"

  # 日志配置
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
