# Kubernetes Secret - AI Resume 应用敏感配置
# 注意: 生产环境应使用 kubectl create secret 命令或 Sealed Secrets
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ai-resume
type: Opaque
stringData:
  # 数据库配置
  MYSQL_ROOT_PASSWORD: "change-me-in-production"
  MYSQL_DATABASE: "ai_resume"
  MYSQL_USER: "airesume"
  MYSQL_PASSWORD: "change-me-in-production"

  # 应用密钥
  SECRET_KEY: "change-me-in-production-use-openssl-rand-hex-32"
  JWT_SECRET_KEY: "change-me-in-production-use-openssl-rand-hex-32"

  # AI 服务 API 密钥
  OPENAI_API_KEY: "sk-your-openai-key"
  DEEPSEEK_API_KEY: "sk-your-deepseek-key"
  XIAOMI_API_KEY: "your-xiaomi-api-key"

  # OAuth 配置
  WECHAT_APP_ID: "your-wechat-app-id"
  WECHAT_APP_SECRET: "your-wechat-app-secret"

  # Redis 配置
  REDIS_PASSWORD: ""

  # Email 服务配置
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@example.com"
  SMTP_PASSWORD: "change-me"
  SMTP_FROM: "AI Resume <noreply@example.com>"

---
# Docker Registry Secret (如果使用私有镜像仓库)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: ai-resume
type: kubernetes.io/dockerconfigjson
data:
  # .dockerconfigjson: base64 encoded docker config
  # 使用命令生成: kubectl create secret docker-registry docker-registry-secret \
  #   --docker-server=your-registry --docker-username=user --docker-password=password \
  #   --docker-email=email --namespace=ai-resume --dry-run=client -o yaml
  .dockerconfigjson: eyJhdXRocyI6e319fQ==
