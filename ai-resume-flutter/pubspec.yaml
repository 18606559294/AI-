name: ai_resume_flutter
description: "AI Resume - 智能简历生成应用 (Flutter统一版本)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI图标
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # 网络请求
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # JSON序列化
  json_annotation: ^4.9.0

  # 表单验证
  # form_field_validator: ^0.2.0 # 包不存在，暂时移除

  # 工具类
  intl: ^0.20.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  file_picker: ^8.1.6
  flutter_markdown: ^0.7.3

  # 函数式编程 (用于Either类型)
  dartz: ^0.10.1

  # PDF生成
  pdf: ^3.11.1
  printing: ^5.13.2

  # UI组件
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # 验证码倒计时
  # countdown_count_down: ^0.0.3 # 包不存在，暂时移除

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  # hive_generator: ^2.0.1 # 暂时移除，有版本冲突

  # 代码检查
  flutter_lints: ^4.0.0

  # 测试
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/docs/

