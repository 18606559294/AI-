# Alertmanager 配置文件
global:
  resolve_timeout: 5m
  # Slack 配置示例
  slack_api_url: ''  # 在环境变量中设置: SLACK_WEBHOOK_URL

# 路由配置
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  # 子路由
  routes:
    # Critical 级别告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true

    # Warning 级别告警 - 延迟通知
    - match:
        severity: warning
      receiver: 'warning-alerts'
      continue: true

    # 服务相关告警
    - match:
        service: backend
      receiver: 'backend-team'
      group_wait: 30s

    - match:
        service: frontend
      receiver: 'frontend-team'
      group_wait: 30s

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '🚨 {{ .GroupLabels.alertname }}'
        text: |
          *告警详情:*
          {{ range .Alerts }}
          *告警名称:* {{ .Labels.alertname }}
          *严重级别:* {{ .Labels.severity }}
          *开始时间:* {{ .StartsAt }}
          *摘要:* {{ .Annotations.summary }}
          *描述:* {{ .Annotations.description }}
          {{ end }}

  # 关键告警接收器
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#critical-alerts'
        title: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          *关键告警 - 立即处理！*

          {{ range .Alerts }}
          *告警名称:* {{ .Labels.alertname }}
          *严重级别:* {{ .Labels.severity }}
          *开始时间:* {{ .StartsAt }}
          *摘要:* {{ .Annotations.summary }}
          *描述:* {{ .Annotations.description }}
          *运行视图:* {{ .GeneratorURL }}
          {{ end }}

        send_resolved: true

    # 邮件通知
    email_configs:
      - to: 'ops@yourdomain.com'
        headers:
          Subject: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
        html: |
          <h3>关键告警通知</h3>
          {{ range .Alerts }}
          <p><strong>告警名称:</strong> {{ .Labels.alertname }}</p>
          <p><strong>严重级别:</strong> {{ .Labels.severity }}</p>
          <p><strong>开始时间:</strong> {{ .StartsAt }}</p>
          <p><strong>摘要:</strong> {{ .Annotations.summary }}</p>
          <p><strong>描述:</strong> {{ .Annotations.description }}</p>
          {{ end }}

  # 警告级别接收器
  - name: 'warning-alerts'
    slack_configs:
      - channel: '#warnings'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: |
          *警告告警 - 请关注*

          {{ range .Alerts }}
          *告警名称:* {{ .Labels.alertname }}
          *严重级别:* {{ .Labels.severity }}
          *开始时间:* {{ .StartsAt }}
          *摘要:* {{ .Annotations.summary }}
          {{ end }}

        send_resolved: true

  # Backend 团队接收器
  - name: 'backend-team'
    slack_configs:
      - channel: '#backend-alerts'
        title: '🚧 Backend Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Backend 服务告警*

          {{ range .Alerts }}
          *告警名称:* {{ .Labels.alertname }}
          *实例:* {{ .Labels.instance }}
          *摘要:* {{ .Annotations.summary }}
          {{ end }}

        send_resolved: true

  # Frontend 团队接收器
  - name: 'frontend-team'
    slack_configs:
      - channel: '#frontend-alerts'
        title: '🖥️ Frontend Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Frontend 服务告警*

          {{ range .Alerts }}
          *告警名称:* {{ .Labels.alertname }}
          *实例:* {{ .Labels.instance }}
          *摘要:* {{ .Annotations.summary }}
          {{ end }}

        send_resolved: true

# 抑制规则
inhibit_rules:
  # 如果有关键告警，抑制该服务的警告
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# 模板配置
templates:
  - '/etc/alertmanager/templates/*.tmpl'
