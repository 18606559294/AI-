version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-resume-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_resume.db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=TMbXg44EMiTSW4I2R4JCXF4LebBEvHKveUBJNCr289M
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - XIAOMI_API_KEY=sk-c0uo5p7vq8h9p0fm45978gvkky3dgtbhn68uai4y2pnyt12o
      - DEFAULT_AI_PROVIDER=xiaomi
      - DEBUG=false
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:80"]
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-resume-network

  # 前端服务
  frontend:
    build:
      context: ./ai-resume-web
      dockerfile: Dockerfile
    container_name: ai-resume-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-resume-network

  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: ai-resume-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - ai-resume-network

  # MySQL 数据库（可选，生产环境推荐）
  db:
    image: mysql:8.0
    container_name: ai-resume-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ai_resume
      - MYSQL_USER=airesume
      - MYSQL_PASSWORD=airesume_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-resume-network
    profiles:
      - production  # 使用 --profile production 启动

  # Nginx 反向代理（生产环境）
  nginx:
    image: nginx:alpine
    container_name: ai-resume-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - ai-resume-network
    profiles:
      - production  # 使用 --profile production 启动

volumes:
  backend_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai-resume-network:
    driver: bridge
