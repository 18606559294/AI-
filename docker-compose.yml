services:
  backend:
    image: ghcr.io/18606559294/ai-resume-backend:latest
    container_name: ai-resume-backend
    ports:
      - "8000:8000"
    environment:
      - USE_SQLITE=true
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_resume.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=production
      - SECRET_KEY=48f5ff7d1aa60c67f2a48636b4ee450fce688f9816f66dea152aa66745916ba9
      - JWT_SECRET=7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=60
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:80"]
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - DEFAULT_AI_PROVIDER=xiaomi
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=60
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-resume-network
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/18606559294/ai-resume-frontend:latest
    container_name: ai-resume-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-resume-network

  redis:
    image: redis:7-alpine
    container_name: ai-resume-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - ai-resume-network

volumes:
  backend_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai-resume-network:
    driver: bridge
