services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-resume-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      - USE_SQLITE=true
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_resume.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:80"]
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - DEFAULT_AI_PROVIDER=xiaomi
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-resume-network

  frontend:
    build:
      context: .
      dockerfile: ai-resume-web/Dockerfile
    container_name: ai-resume-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-resume-network

  redis:
    image: redis:7-alpine
    container_name: ai-resume-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - ai-resume-network

volumes:
  backend_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai-resume-network:
    driver: bridge
