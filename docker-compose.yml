services:
  backend:
    image: ghcr.io/18606559294/ai-resume-backend:lite
    ports:
      - "8000:8000"
    environment:
      - USE_SQLITE=true
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_resume.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=production
      - SECRET_KEY=48f5ff7d1aa60c67f2a48636b4ee450fce688f9816f66dea152aa66745916ba9
      - JWT_SECRET=7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b
      - CORS_ORIGINS=["*"]
      - DEFAULT_AI_PROVIDER=xiaomi
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/18606559294/ai-resume-frontend:latest
    ports:
      - "3000:80"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  backend_data:
  redis_data:
