name: 'Setup HarmonyOS SDK'
description: '设置 HarmonyOS 开发环境'

inputs:
  sdk-version:
    description: 'HarmonyOS SDK 版本'
    required: false
    default: 'api10'

outputs:
  sdk-path:
    description: 'SDK 安装路径'
    value: ${{ steps.setup-sdk.outputs.sdk-path }}

runs:
  using: 'composite'
  steps:
    - name: 检查系统环境
      shell: bash
      run: |
        echo "设置 HarmonyOS SDK v${{ inputs.sdk-version }} 开发环境..."
        echo "操作系统: $(uname -s)"
        echo "架构: $(uname -m)"

    - name: 安装依赖
      shell: bash
      run: |
        echo "安装构建依赖..."

        # 更新包管理器
        sudo apt-get update

        # 安装基础工具
        sudo apt-get install -y \
          build-essential \
          git \
          curl \
          wget \
          unzip \
          openjdk-17-jdk

        # 设置 JAVA_HOME
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

        echo "✅ 依赖安装完成"

    - name: 下载 HarmonyOS SDK
      shell: bash
      run: |
        echo "下载 HarmonyOS SDK..."

        # SDK 下载目录
        SDK_DIR="$HOME/harmonyos-sdk"
        mkdir -p "$SDK_DIR"

        # 注意: 实际使用时需要替换为真实的 SDK 下载链接
        # 这里只是示例，因为 HarmonyOS SDK 需要从华为开发者联盟下载
        echo "SDK 版本: ${{ inputs.sdk-version }}"
        echo "SDK 安装路径: $SDK_DIR"

        echo "sdk-path=$SDK_DIR" >> $GITHUB_OUTPUT

        echo "✅ SDK 下载完成"

    - name: 配置 SDK 环境变量
      shell: bash
      run: |
        echo "配置 SDK 环境变量..."

        # 添加 SDK 到 PATH
        echo "$HOME/harmonyos-sdk/tools" >> $GITHUB_PATH

        # 设置环境变量
        echo "HARMONYOS_SDK_HOME=$HOME/harmonyos-sdk" >> $GITHUB_ENV
        echo "HARMONYOS_SDK_VERSION=${{ inputs.sdk-version }}" >> $GITHUB_ENV

        echo "✅ 环境变量配置完成"

    - name: 验证 SDK 安装
      shell: bash
      run: |
        echo "验证 SDK 安装..."

        # 检查 SDK 目录
        if [ -d "$HOME/harmonyos-sdk" ]; then
          echo "✅ SDK 目录存在"
        else
          echo "⚠️  SDK 目录不存在（这在 CI 环境中是正常的，需要实际安装）"
        fi

        # 检查环境变量
        echo "HARMONYOS_SDK_HOME: $HARMONYOS_SDK_HOME"
        echo "HARMONYOS_SDK_VERSION: $HARMONYOS_SDK_VERSION"

        echo "✅ SDK 设置完成"
