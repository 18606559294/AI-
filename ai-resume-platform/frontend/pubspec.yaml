name: ai_resume_app
description: AI驱动简历智能生成平台 - 跨平台客户端

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 核心UI
  cupertino_icons: ^1.0.6
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 路由
  go_router: ^14.0.0
  
  # 网络请求
  dio: ^5.4.0

  # 微信SDK (暂时禁用以解决编译问题)
  # fluwx: ^4.0.0

  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # JSON序列化
  json_annotation: ^4.8.1
  
  # 表单验证
  flutter_form_builder: ^9.0.0
  form_builder_validators: ^10.0.0
  
  # UI组件
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # 文件处理 (暂时禁用以解决构建问题)
  # file_picker: ^10.3.9
  path_provider: ^2.1.2
  # open_filex: ^4.3.4
  
  # 工具
  intl: ^0.19.0
  url_launcher: ^6.2.3
  
  # 动画
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

  # 测试工具
  mockito: ^5.4.4
  http_mock_adapter: ^0.6.1
  integration_test:
    sdk: flutter

  # 性能和调试工具
  flutter_driver:
    sdk: flutter
  test: ^1.24.0

flutter:
  uses-material-design: true
  
