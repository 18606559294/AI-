name: AI Resume Platform CI/CD

# 触发条件
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # 允许手动触发

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  # ==================== 后端测试 ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          cd backend
          pip install -r requirements.txt

      - name: 代码格式检查
        run: |
          cd backend
          black --check app/
          flake8 app/ --max-line-length=120

      - name: 运行单元测试
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml

      - name: 上传测试覆盖率
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend

  # ==================== 前端测试 ====================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter版本验证
        run: flutter --version

      - name: 获取Flutter依赖
        working-directory: ./frontend
        run: flutter pub get

      - name: 代码分析
        working-directory: ./frontend
        run: flutter analyze

      - name: 运行单元测试
        working-directory: ./frontend
        run: flutter test --coverage

      - name: 上传测试覆盖率
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend

  # ==================== Android构建测试 ====================
  android-build:
    name: Android Build Test
    runs-on: ubuntu-latest
    needs: [frontend-test]
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 获取Flutter依赖
        working-directory: ./frontend
        run: flutter pub get

      - name: 构建APK (Debug)
        working-directory: ./frontend
        run: flutter build apk --debug

      - name: 构建APK (Release)
        working-directory: ./frontend
        run: flutter build apk --release

      - name: 构建App Bundle (Release)
        working-directory: ./frontend
        run: flutter build appbundle --release

      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            frontend/build/app/outputs/flutter-apk/app-release.apk
            frontend/build/app/outputs/bundle/release/app-release.aab

  # ==================== Espresso UI测试 ====================
  android-instrumented-test:
    name: Android Instrumented Tests
    runs-on: ubuntu-latest
    needs: [android-build]
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 启用Kotlin缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 运行Espresso测试
        working-directory: ./frontend
        run: |
          cd android
          ./gradlew connectedCheck || true

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: frontend/android/app/build/reports/

  # ==================== 性能基准测试 ====================
  benchmark-test:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [android-build]
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 运行Macrobenchmark
        working-directory: ./frontend/android
        run: |
          ./gradlew :app:connectedCheck \
            -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRuns=1 \
            -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.outputToRunResultsJson=true
        continue-on-error: true

      - name: 上传基准测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: frontend/android/app/build/outputs/

  # ==================== Docker构建 ====================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-test]
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建后端Docker镜像
        run: |
          docker build -t ai-resume-backend:test -f backend/Dockerfile backend/

      - name: 构建Nginx镜像
        run: |
          docker build -t ai-resume-nginx:test -f nginx/Dockerfile nginx/

      - name: Docker安全扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-resume-backend:test
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: 上传扫描结果
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==================== 集成测试 ====================
  e2e-test:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ai_resume_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          cd backend
          pip install -r requirements.txt

      - name: 启动后端服务
        run: |
          cd backend
          python -m uvicorn app.main:app &
          sleep 10

      - name: 运行E2E测试
        run: |
          pytest tests/e2e/ -v

  # ==================== 安全扫描 ====================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 代码安全扫描 (CodeQL)
        uses: github/codeql-action/analyze@v3
        with:
          languages: python, javascript, kotlin

      - name: 依赖安全扫描
        run: |
          pip install safety
          cd backend
          safety check --json > safety-results.json || true

      - name: Flutter依赖审计
        working-directory: ./frontend
        run: |
          flutter pub deps | grep -v "^\s" | grep -v "^$" | grep -v "^$" || true

  # ==================== 发布构建 ====================
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-test, frontend-test, android-build, docker-build]
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 获取Flutter依赖
        working-directory: ./frontend
        run: flutter pub get

      - name: 构建生产APK
        working-directory: ./frontend
        run: flutter build apk --release --split-per-abi

      - name: 构建生产AAB
        working-directory: ./frontend
        run: flutter build appbundle --release

      - name: 生成版本号
        id: version
        run: |
          VERSION=$(date +%Y.%m.%d).${{ github.run_number }}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            frontend/build/app/outputs/flutter-apk/*.apk
            frontend/build/app/outputs/bundle/release/*.aab
          draft: false
          prerelease: false

      - name: 上传发布产物
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            frontend/build/app/outputs/flutter-apk/
            frontend/build/app/outputs/bundle/
