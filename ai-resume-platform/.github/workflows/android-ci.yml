name: Android CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
    
    - name: 获取Flutter依赖
      working-directory: ./frontend
      run: flutter pub get
    
    - name: 代码分析
      working-directory: ./frontend
      run: flutter analyze
    
    - name: 运行Flutter测试
      working-directory: ./frontend
      run: flutter test
    
    - name: 构建Android APK (Debug)
      working-directory: ./frontend
      run: flutter build apk --debug
    
    - name: 运行Android单元测试
      working-directory: ./frontend/android
      run: ./gradlew test
    
    - name: 运行Android UI测试
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 33
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        script: cd frontend/android && ./gradlew connectedAndroidTest
    
    - name: 上传测试报告
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: frontend/android/app/build/reports/
    
    - name: 上传APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: frontend/build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
    
    - name: 获取Flutter依赖
      working-directory: ./frontend
      run: flutter pub get
    
    - name: 构建Android APK (Release)
      working-directory: ./frontend
      run: flutter build apk --release
    
    - name: 构建Android App Bundle
      working-directory: ./frontend
      run: flutter build appbundle --release
    
    - name: 上传发布版本
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: |
          frontend/build/app/outputs/flutter-apk/app-release.apk
          frontend/build/app/outputs/bundle/release/app-release.aab
    
    - name: 创建Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          frontend/build/app/outputs/flutter-apk/app-release.apk
          frontend/build/app/outputs/bundle/release/app-release.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}